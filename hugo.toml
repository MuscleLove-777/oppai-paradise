baseURL = "https://musclelove-777.github.io/oppai-paradise/"
languageCode = "ja"
defaultContentLanguage = "ja"
title = "おっぱいパラダイス | 巨乳・美乳AV厳選レビュー"
theme = "PaperMod"
[pagination]
  pagerSize = 20

enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[services]
  [services.googleAnalytics]
    ID = "G-L26CFV776G"

[sitemap]
  changefreq = "daily"
  priority = 0.7

[params]
googleAnalyticsID = "G-YV53HTHVY2"
  canonicalURL = true
  env = "production"
  description = "巨乳・美乳・爆乳ジャンルのAV作品を毎日厳選。たわわなおっぱいをサンプル動画付きで紹介"
  author = "おっぱいパラダイス編集部"
  images = ["https://musclelove-777.github.io/oppai-paradise/favicon.svg"]
  keywords = ["巨乳 AV おすすめ", "美乳 AV ランキング", "爆乳 AV", "Hカップ AV", "巨乳 新作", "おっぱい AV", "乳首 AV", "パイズリ AV"]
  defaultTheme = "dark"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = false
  TocOpen = false
  comments = false

  [params.homeInfoParams]
    Title = "おっぱいパラダイス"
    Content = "巨乳・美乳・爆乳好きのための厳選レビュー。毎日更新、サンプル動画付き！"

  [[params.socialIcons]]
    name = "x-twitter"
    url = "https://x.com/MuscleGirlLove7"

  [[params.socialIcons]]
    name = "linktree"
    url = "https://linktr.ee/ILoveMyCats"

[params.assets]
  favicon = "favicon.svg"
  favicon16x16 = "favicon.svg"
  favicon32x32 = "favicon.svg"
  apple_touch_icon = "favicon.svg"
  safari_pinned_tab = "favicon.svg"

[params.cover]
  hidden = false
  hiddenInList = false
  hiddenInSingle = false
  linkFullImages = true

[params.fuseOpts]
  isCaseSensitive = false
  shouldSort = true
  location = 0
  distance = 1000
  threshold = 0.4
  minMatchCharLength = 0
  keys = ["title", "permalink", "summary", "content"]

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

[[menus.main]]
  identifier = "search"
  name = "検索"
  url = "/search/"
  weight = 10

[[menus.main]]
  identifier = "categories"
  name = "カテゴリ"
  url = "/categories/"
  weight = 20

[[menus.main]]
  identifier = "tags"
  name = "タグ"
  url = "/tags/"
  weight = 30

[[menus.main]]
  identifier = "archive"
  name = "アーカイブ"
  url = "/archives/"
  weight = 40
